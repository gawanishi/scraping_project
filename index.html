
    <!DOCTYPE html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>プロ仕様・株価ダッシュボード</title>
        <style>
            body { 
                font-family: 'Segoe UI', Meiryo, sans-serif; 
                background: #1a1a1a; /* ダークモード風 */
                color: #eee;
                padding: 40px; 
            }
            .container { 
                max-width: 900px; 
                margin: 0 auto; 
                background: #2d2d2d; 
                padding: 30px; 
                border-radius: 20px; 
                box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            }
            h1 { text-align: center; color: #fff; margin-bottom: 30px; }
            
            /* あなたが作ったスタイルをここに適用！ */
            .stock-item { 
                background: #3d3d3d;
                margin-bottom: 15px;
                padding: 20px;
                border-radius: 0 10px 10px 0;
                font-size: 1.5em;
                font-weight: bold;
                display: flex;
                justify-content: space-between;
                transition: transform 0.2s;
            }
            .stock-item:hover { transform: translateX(10px); }

            .status-up { 
                color: #ff4d4d; 
                border-left: 10px solid #ff4d4d; 
                padding-left: 15px; 
            }
            .status-down { 
                color: #00fa9a; 
                border-left: 10px solid #00fa9a; 
                padding-left: 15px; 
            }

            .news-item { padding: 10px; border-bottom: 1px solid #444; color: #ccc; }
            .time { text-align: right; color: #888; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>📈 MARKET DASHBOARD</h1>
            <p class="time">LAST UPDATE: 2026-03-19 12:30:15</p>
            
            <h3>💹 監視銘柄</h3>
            <div class="stock-item status-down">エヌビディア: 180.40円 (-0.84%)</div><div class="stock-item status-down">トヨタ: 3352.00円 (-1.53%)</div><div class="stock-item status-down">ソフトバンクG: 3593.00円 (-4.19%)</div>
            
            <h3>📰 ヘッドライン</h3>
            <div class="news-item">・JavaScriptの設定を変更する方法はこちら</div><div class="news-item">・日銀 政策金利据え置き決定3/19(木) 12:01</div><div class="news-item">・学童で児童土下座させる 虐待判断3/19(木) 11:46</div><div class="news-item">・日米首脳 共同声明発表は見送りか3/19(木) 11:29</div>
        </div>
    </body>
    </html>
